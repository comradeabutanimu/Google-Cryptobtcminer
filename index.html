<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link class="favicon" rel="icon" type="image/png" href="/src/assets/images/favicon_1779933297334.png" />
    <title>CryptoBTC Miner | Cloud Mining Platform</title>
    <script type="text/javascript">
      // Suppress known third-party Tawk.to WebSocket/getForm errors in sandbox/iframe context
      window.addEventListener('error', function(e) {
        if (e && e.message) {
          const msg = String(e.message).toLowerCase();
          const url = String(e.filename || '').toLowerCase();
          if (
            msg.includes('tawk') || 
            msg.includes('getform') || 
            msg.includes('socket server') || 
            url.includes('tawk.to')
          ) {
            e.preventDefault();
            e.stopPropagation();
            if (e.stopImmediatePropagation) {
              e.stopImmediatePropagation();
            }
            return true;
          }
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        if (e && e.reason) {
          const msg = String(e.reason.message || e.reason).toLowerCase();
          if (
            msg.includes('tawk') || 
            msg.includes('getform') || 
            msg.includes('socket server')
          ) {
            e.preventDefault();
            e.stopPropagation();
            if (e.stopImmediatePropagation) {
              e.stopImmediatePropagation();
            }
            return true;
          }
        }
      }, true);

      // Suppress [Tawk/Form]: undefined undefined console errors
      const originalConsoleError = console.error;
      console.error = function(...args) {
        const argStr = args.map(arg => String(arg)).join(' ');
        if (
          argStr.includes('[Tawk/Form]') || 
          argStr.includes('Tawk_API') || 
          argStr.includes('getForm') || 
          argStr.includes('tawk.to')
        ) {
          return;
        }
        originalConsoleError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--Start of Tawk.to Script-->
    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/6a31c8c0b319cc1d4d432151/1jr97gc56';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
    <!--End of Tawk.to Script-->
  </body>
</html>
